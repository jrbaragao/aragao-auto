name: Build e Deploy

on:
  push:
    branches: [main]
  # Permite disparar o build via webhook do CMS quando o profissional
  # publica novas imagens/paginas (repository_dispatch) alem do push normal.
  repository_dispatch:
    types: [cms-publish]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      # Deploy real: troque este passo pela action da Vercel/Netlify/
      # Cloudflare Pages, usando os secrets do repositorio (Settings > Secrets).
      - name: Deploy (placeholder)
        run: echo "Plugue aqui a action de deploy (Vercel/Netlify/Cloudflare Pages)"
